<!-- auth-callback.html-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Callback</title>
    <script src="/scripts/insights.js" type="module"></script>
</head>
<body>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state'); // 这里存的是当初点击登录的页面地址

    if (code) {
        // 1. 去 Worker 换 Token
        fetch(`api/exchange-token?code=${code}`)
            .then(res => res.json())
            .then(data => {
                if (data.access_token) {
                    // 2. 存入全站通用的 localStorage
                    localStorage.setItem('gh_auth', JSON.stringify({
                        token: data.access_token,
                        timestamp: new Date().getTime()
                    }));
                    // 3. 根据 state 完美回源
                    window.location.href = state ? atob(state) : './archive.html';
                }
            });
    }
</script>
</body>
</html>
